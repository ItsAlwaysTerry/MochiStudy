<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>UI Phase 2 Contact Sheet</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fdf9f2;
      --surface: #fff;
      --ink: #2b2226;
      --muted: #6b5a60;
      --line: rgba(43, 34, 38, .1);
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    figure {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
    }
    img {
      display: block;
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: #fff;
    }
    figcaption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>UI Phase 2 Contact Sheet</h1>
  <div class="grid">
    <figure><img src="01-home-desktop-top.png" alt=""><figcaption>01-home-desktop-top.png</figcaption></figure>
    <figure><img src="01-home-desktop-bottom.png" alt=""><figcaption>01-home-desktop-bottom.png</figcaption></figure>
    <figure><img src="02-learn-review-desktop.png" alt=""><figcaption>02-learn-review-desktop.png</figcaption></figure>
    <figure><img src="03-learn-archive-expanded-desktop.png" alt=""><figcaption>03-learn-archive-expanded-desktop.png</figcaption></figure>
    <figure><img src="04-learn-today-desktop.png" alt=""><figcaption>04-learn-today-desktop.png</figcaption></figure>
    <figure><img src="05-achievements-desktop.png" alt=""><figcaption>05-achievements-desktop.png</figcaption></figure>
    <figure><img src="06-settings-desktop-top.png" alt=""><figcaption>06-settings-desktop-top.png</figcaption></figure>
    <figure><img src="06-settings-desktop-part2.png" alt=""><figcaption>06-settings-desktop-part2.png</figcaption></figure>
    <figure><img src="06-settings-desktop-part3.png" alt=""><figcaption>06-settings-desktop-part3.png</figcaption></figure>
    <figure><img src="06-settings-desktop-part4.png" alt=""><figcaption>06-settings-desktop-part4.png</figcaption></figure>
    <figure><img src="06-settings-desktop-bottom.png" alt=""><figcaption>06-settings-desktop-bottom.png</figcaption></figure>
    <figure><img src="07-focus-commitment-modal-desktop.png" alt=""><figcaption>07-focus-commitment-modal-desktop.png</figcaption></figure>

</html>
