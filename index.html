<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MochiStudy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Be+Vietnam+Pro:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-nav" aria-label="主导航">
        <section class="pet-mini" id="sidebar-pet-info">
          <div>
            <h1>我的农场</h1>
            <p id="side-level">Lv.1 小菜园</p>
            <strong id="side-resources">收获0次 · XP0</strong>
          </div>
        </section>
        <nav class="nav-list">
          <button class="nav-item active" data-route="home"><span class="material-symbols-outlined">home</span>首页</button>
          <button class="nav-item" data-route="schedule"><span class="material-symbols-outlined">calendar_month</span>日程</button>
          <button class="nav-item" data-route="map"><span class="material-symbols-outlined">collections_bookmark</span>学习档案</button>
          <button class="nav-item" data-route="achievements"><span class="material-symbols-outlined">military_tech</span>勋章</button>
          <button class="nav-item" data-route="settings"><span class="material-symbols-outlined">settings</span>设置</button>
        </nav>
      </aside>

      <header class="top-bar">
        <button class="icon-btn mobile-only" id="mobile-menu" aria-label="打开导航"><span class="material-symbols-outlined">menu</span></button>
        <strong class="brand">MochiStudy</strong>
        <nav class="top-tabs" aria-label="快捷导航">
          <button data-route="home">控制台</button>
          <button data-route="schedule">日历</button>
          <button data-route="map">学习档案</button>
        </nav>
        <div class="top-actions">
          <button class="btn btn-outline btn-sm" data-action="export-data"><span class="material-symbols-outlined">download</span>导出备份</button>
          <span id="top-resources" class="pill">收获0次 · XP0</span>
          <button class="icon-btn" data-route="settings" aria-label="设置"><span class="material-symbols-outlined">settings</span></button>
        </div>
      </header>

      <main id="view" class="content" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="移动端导航">
        <button class="nav-item active" data-route="home"><span class="material-symbols-outlined">home</span>首页</button>
          <button class="nav-item" data-route="schedule"><span class="material-symbols-outlined">calendar_month</span>日程</button>
          <button class="nav-item" data-route="map"><span class="material-symbols-outlined">collections_bookmark</span>档案</button>
          <button class="nav-item" data-route="settings"><span class="material-symbols-outlined">settings</span>设置</button>
      </nav>
    </div>

    <div id="modal-root" class="modal-root" hidden></div>
    <div id="toast-root" class="toast-root" aria-live="assertive"></div>
    <div id="focus-overlay" class="focus-overlay" hidden></div>
    <div id="rest-reminder-overlay" class="rest-reminder-overlay" hidden></div>
    <div id="debug-panel" style="display:none">
      <div id="debug-panel-inner"></div>
    </div>

    <script defer src="modules/ai.js"></script>
    <script defer src="modules/timer.js"></script>
    <script defer src="modules/farm.js"></script>
    <script defer src="modules/pet.js"></script>
    <script defer src="modules/knowledgeMap.js"></script>
    <script defer src="modules/calendar.js"></script>
    <script defer src="app.js"></script>
  </body>
</html>
